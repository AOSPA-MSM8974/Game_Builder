name: Kivy Android Full SDK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:

    # =========================
    # 1. Checkout code
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # 2. Python setup
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # 3. System dependencies
    # =========================
    - name: Install system packages
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip wget curl \
          openjdk-17-jdk \
          python3-pip build-essential \
          libffi-dev libssl-dev \
          autoconf automake libtool pkg-config \
          zlib1g-dev cmake

    # =========================
    # 4. Python dependencies
    # =========================
    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install buildozer cython kivy==2.3.0

    # =========================
    # 5. Install Android SDK (FULL MANUAL)
    # =========================
    - name: Install Android SDK
      run: |
        mkdir -p $ANDROID_SDK_ROOT
        cd $ANDROID_SDK_ROOT

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip cmdline.zip

        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ || true

        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin

        # Accept licenses (fixes build-tools + AIDL errors)
        yes | sdkmanager --licenses || true

        # Install FULL toolchain required for Buildozer
        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    # =========================
    # 6. Export environment paths
    # =========================
    - name: Set environment variables
      run: |
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

    # =========================
    # 7. Buildozer config safety
    # =========================
    - name: Prepare Buildozer
      run: |
        mkdir -p ~/.buildozer
        buildozer init || true

    # =========================
    # 8. Build APK (uses system SDK)
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # 9. Upload APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: medieval-kingdom-apk
        path: bin/*.apk
