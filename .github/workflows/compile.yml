name: Build APK

on:
  push:
    branches: [ stick ]
  pull_request:
    branches: [ stick ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :android:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StickRun-debug
          path: android/build/outputs/apk/debug/**.apk
          retention-days: 14

      - name: Check APK contents
        run: |
          echo "Listing APK contents..."
          APK=$(find . -name "*.apk" | head -n 1)
          echo "APK found: $APK"

          unzip -l "$APK" > apk_contents.txt
          cat apk_contents.txt

  release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :android:assembleRelease --stacktrace

      - name: Sign release APK
        if: >
          env.KEYSTORE_BASE64 != '' &&
          env.KEY_ALIAS != '' &&
          env.KEY_PASSWORD != '' &&
          env.STORE_PASSWORD != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release.jks

          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks /tmp/release.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out android/build/outputs/apk/release/stickrun-release-signed.apk \
            android/build/outputs/apk/release/android-release-unsigned.apk

          rm /tmp/release.jks

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: StickRun-release
          path: android/build/outputs/apk/release/**.apk
          retention-days: 30
