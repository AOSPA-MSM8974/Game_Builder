name: Build Kivy Android APK (Docker Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # =========================
    # 1. Checkout repository
    # =========================
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================
    # 2. Build APK using Docker Buildozer
    # =========================
    - name: Build APK
      run: |
        docker run --rm \
          -v $PWD:/home/user/hostcwd \
          -w /home/user/hostcwd \
          kivy/buildozer:latest \
          bash -c "buildozer -v android debug"

    # =========================
    # 3. Upload APK artifact
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: medieval-kingdom-apk
        path: bin/*.apk
